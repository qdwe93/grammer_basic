# GitHub Pages 자동 배포 — main에 푸시될 때마다 빌드해서 Pages에 올린다.
# 사용 준비(저장소에서 1회): Settings → Pages → Build and deployment → Source: "GitHub Actions"
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 수동 실행 버튼

# Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1건만 유지(진행 중인 런은 취소하지 않고 큐잉)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
